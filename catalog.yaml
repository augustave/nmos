version: "1.0"
library_name: "a16z-skill-library"
owner: "taoconrad"
status: "active"

canonical_contract:
  required_package_files:
    - "SKILL.md"
    - "PRD.yaml"
  recommended_package_files:
    - "schema.yaml"
    - "SWARM.md"
  required_skill_front_matter_fields:
    - "name"
    - "version"
    - "owner"
    - "status"
    - "intent"
    - "when_to_use"
    - "when_not_to_use"
    - "inputs"
    - "outputs"

